name: Generar ficha

# Gates 2 y 3: ante un cambio en los datos de familia o en las normas/template,
# regenera el HTML y el PDF borrador y lo publica como artifact del workflow.
# El usuario revisa el PDF (Gate 3) sobre el PR.
#
# NOTA: requiere el runner self-hosted (todavía NO registrado para este repo).
# Ver SETUP.md para instalar Python 3.11+, dependencias y `playwright install chromium`
# y registrar el runner con la label `ft-creator`.

on:
  push:
    paths:
      - "familias/**"
      - "normas/**"
      - "templates/**"
      - "scripts/**"
      - "requirements.txt"
  pull_request:
    paths:
      - "familias/**"
      - "normas/**"
      - "templates/**"
      - "scripts/**"
  workflow_dispatch:
    inputs:
      familia:
        description: "ID de familia a generar (vacío = todas)"
        required: false
        default: ""

jobs:
  generar:
    # Runner self-hosted del patrón del sistema de auditoría existente.
    runs-on: [self-hosted, ft-creator]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependencias
        # En el runner ya conviven Python 3.11+ y Chromium (instalados una vez,
        # ver SETUP.md). Este paso solo asegura las libs de Python.
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: Validar schema de familias
        run: python3 scripts/validar.py

      - name: Generar HTML
        run: python3 scripts/generar_ficha.py ${{ github.event.inputs.familia }}

      - name: Renderizar PDF (Playwright / Chromium)
        run: python3 scripts/render_pdf.py

      - name: Publicar PDFs borrador como artifact
        uses: actions/upload-artifact@v4
        with:
          name: fichas-borrador
          path: |
            output/borrador/*.pdf
            output/borrador/*.html
          if-no-files-found: error
