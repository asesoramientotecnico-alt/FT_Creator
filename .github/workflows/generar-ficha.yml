name: Generar ficha

# Gates 2 y 3: ante un cambio en los datos de familia o en las normas/template,
# regenera el HTML y el PDF borrador y lo publica como artifact del workflow.
# El usuario revisa el PDF (Gate 3) sobre el PR.
#
# Runner self-hosted registrado con label `ft-creator` (Windows, ft-creator-win).

on:
  push:
    paths:
      - "familias/**"
      - "normas/**"
      - "templates/**"
      - "scripts/**"
      - "requirements.txt"
      - ".github/workflows/generar-ficha.yml"
  pull_request:
    paths:
      - "familias/**"
      - "normas/**"
      - "templates/**"
      - "scripts/**"
      - ".github/workflows/generar-ficha.yml"
  workflow_dispatch:
    inputs:
      familia:
        description: "ID de familia a generar (vacío = todas)"
        required: false
        default: ""

jobs:
  generar:
    runs-on: [self-hosted, ft-creator]
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependencias
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: Instalar navegador Chromium (Playwright)
        # Idempotente: descarga el binario solo la primera vez.
        run: python3 -m playwright install chromium

      - name: Validar schema de familias
        run: python3 scripts/validar.py

      - name: Generar HTML
        run: python3 scripts/generar_ficha.py ${{ github.event.inputs.familia }}

      - name: Renderizar PDF (Playwright / Chromium)
        run: python3 scripts/render_pdf.py

      - name: Publicar PDFs borrador como artifact
        uses: actions/upload-artifact@v4
        with:
          name: fichas-borrador
          path: |
            output/borrador/*.pdf
            output/borrador/*.html
          if-no-files-found: error
