<svg viewBox="0 0 280 310" xmlns="http://www.w3.org/2000/svg"
     style="width:100%;max-width:68mm;font-family:'DM Sans',Arial,sans-serif;">

  <!-- ─────── PIEZAS ─────── -->
  <!-- Vástago (rosca) -->
  <rect x="110" y="145" width="60" height="115" fill="white" stroke="#222" stroke-width="1.4"/>
  <!-- Líneas de rosca en vástago -->
  <line x1="110" y1="155" x2="170" y2="155" stroke="#aaa" stroke-width="0.4" stroke-dasharray="2,1.5"/>
  <line x1="110" y1="163" x2="170" y2="163" stroke="#aaa" stroke-width="0.4" stroke-dasharray="2,1.5"/>
  <line x1="110" y1="171" x2="170" y2="171" stroke="#aaa" stroke-width="0.4" stroke-dasharray="2,1.5"/>
  <line x1="110" y1="179" x2="170" y2="179" stroke="#aaa" stroke-width="0.4" stroke-dasharray="2,1.5"/>
  <line x1="110" y1="187" x2="170" y2="187" stroke="#aaa" stroke-width="0.4" stroke-dasharray="2,1.5"/>
  <line x1="110" y1="195" x2="170" y2="195" stroke="#aaa" stroke-width="0.4" stroke-dasharray="2,1.5"/>
  <line x1="110" y1="203" x2="170" y2="203" stroke="#aaa" stroke-width="0.4" stroke-dasharray="2,1.5"/>
  <line x1="110" y1="211" x2="170" y2="211" stroke="#aaa" stroke-width="0.4" stroke-dasharray="2,1.5"/>
  <line x1="110" y1="219" x2="170" y2="219" stroke="#aaa" stroke-width="0.4" stroke-dasharray="2,1.5"/>
  <line x1="110" y1="227" x2="170" y2="227" stroke="#aaa" stroke-width="0.4" stroke-dasharray="2,1.5"/>
  <line x1="110" y1="235" x2="170" y2="235" stroke="#aaa" stroke-width="0.4" stroke-dasharray="2,1.5"/>
  <line x1="110" y1="243" x2="170" y2="243" stroke="#aaa" stroke-width="0.4" stroke-dasharray="2,1.5"/>
  <!-- Punta plana vástago -->
  <line x1="110" y1="260" x2="170" y2="260" stroke="#222" stroke-width="1.4"/>

  <!-- Cabeza cilíndrica -->
  <rect x="88" y="75" width="104" height="70" fill="white" stroke="#222" stroke-width="1.4"/>

  <!-- Hexágono interior (allen) — representado como ranura en vista lateral -->
  <line x1="105" y1="75" x2="105" y2="95" stroke="#555" stroke-width="0.8"/>
  <line x1="175" y1="75" x2="175" y2="95" stroke="#555" stroke-width="0.8"/>
  <line x1="105" y1="95" x2="175" y2="95" stroke="#555" stroke-width="1"/>
  <!-- Sombreado llave -->
  <rect x="105" y="75" width="70" height="20" fill="#f0f0f0" stroke="none" opacity="0.7"/>

  <!-- Línea central (eje) -->
  <line x1="140" y1="30" x2="140" y2="280"
        stroke="#003DA5" stroke-width="0.6"
        stroke-dasharray="6,3,1,3"/>

  <!-- ─────── COTAS ─────── -->
  <!-- Flecha helper defs -->
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#333"/>
    </marker>
    <marker id="arrL" markerWidth="6" markerHeight="6" refX="1" refY="3" orient="auto">
      <path d="M6,0 L0,3 L6,6 Z" fill="#333"/>
    </marker>
  </defs>

  <!-- COTA d — diámetro vástago (abajo, horizontal) -->
  <line x1="110" y1="275" x2="170" y2="275" stroke="#333" stroke-width="0.7"
        marker-start="url(#arrL)" marker-end="url(#arr)"/>
  <line x1="110" y1="260" x2="110" y2="278" stroke="#333" stroke-width="0.5" stroke-dasharray="2,1.5"/>
  <line x1="170" y1="260" x2="170" y2="278" stroke="#333" stroke-width="0.5" stroke-dasharray="2,1.5"/>
  <text x="140" y="288" text-anchor="middle" font-size="9" fill="#222" font-weight="600" font-style="italic">d</text>

  <!-- COTA dk — diámetro cabeza (arriba, horizontal) -->
  <line x1="88" y1="58" x2="192" y2="58" stroke="#333" stroke-width="0.7"
        marker-start="url(#arrL)" marker-end="url(#arr)"/>
  <line x1="88" y1="58" x2="88" y2="76" stroke="#333" stroke-width="0.5" stroke-dasharray="2,1.5"/>
  <line x1="192" y1="58" x2="192" y2="76" stroke="#333" stroke-width="0.5" stroke-dasharray="2,1.5"/>
  <text x="140" y="52" text-anchor="middle" font-size="9" fill="#222" font-weight="600" font-style="italic">dk</text>

  <!-- COTA k — altura cabeza (derecha, vertical) -->
  <line x1="207" y1="75" x2="207" y2="145" stroke="#333" stroke-width="0.7"
        marker-start="url(#arrL)" marker-end="url(#arr)"/>
  <line x1="192" y1="75" x2="210" y2="75" stroke="#333" stroke-width="0.5" stroke-dasharray="2,1.5"/>
  <line x1="170" y1="145" x2="210" y2="145" stroke="#333" stroke-width="0.5" stroke-dasharray="2,1.5"/>
  <text x="222" y="113" text-anchor="middle" font-size="9" fill="#222" font-weight="600" font-style="italic">k</text>

  <!-- COTA s — llave allen (izquierda, horizontal interior) -->
  <line x1="105" y1="40" x2="175" y2="40" stroke="#333" stroke-width="0.7"
        marker-start="url(#arrL)" marker-end="url(#arr)"/>
  <line x1="105" y1="40" x2="105" y2="76" stroke="#333" stroke-width="0.5" stroke-dasharray="2,1.5"/>
  <line x1="175" y1="40" x2="175" y2="76" stroke="#333" stroke-width="0.5" stroke-dasharray="2,1.5"/>
  <text x="140" y="35" text-anchor="middle" font-size="8.5" fill="#555" font-style="italic">s</text>

  <!-- COTA L — longitud total (izquierda, vertical) -->
  <line x1="68" y1="75" x2="68" y2="260" stroke="#333" stroke-width="0.7"
        marker-start="url(#arrL)" marker-end="url(#arr)"/>
  <line x1="68" y1="75" x2="89" y2="75" stroke="#333" stroke-width="0.5" stroke-dasharray="2,1.5"/>
  <line x1="68" y1="260" x2="110" y2="260" stroke="#333" stroke-width="0.5" stroke-dasharray="2,1.5"/>
  <text x="50" y="172" text-anchor="middle" font-size="9" fill="#222" font-weight="600" font-style="italic"
        transform="rotate(-90,50,172)">L</text>

  <!-- Etiqueta norma -->
  <rect x="4" y="4" width="60" height="13" rx="2" fill="#003DA5" opacity="0.9"/>
  <text x="34" y="13.5" text-anchor="middle" font-size="7" fill="white" letter-spacing="0.5">DIN 912</text>
</svg>
